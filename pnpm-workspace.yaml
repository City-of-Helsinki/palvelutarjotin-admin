# Minimum age for new packages before they can be used (in minutes) – 10080 min = 1 week
minimumReleaseAge: 10080

# Hoist all dependencies to the root of node_modules because some packages
# (e.g. the draft-js ecosystem) do not work correctly with pnpm's default isolation strategy
shamefullyHoist: true

# Package version overrides to fix vulnerabilities and ensure compatibility
overrides:
  # Keep @testing-library/dom aligned for user-event compatibility.
  '@testing-library/dom': ^10.4.0
  # Security pin for vulnerable transitive @tootallnate/once.
  '@tootallnate/once': '>=3.0.1'
  # Keep typings for legacy cookie <v1 consumers.
  '@types/cookie': ^0.6.0
  # Force patched immutable 3.x for draft-js stack.
  draft-js>immutable: 3.8.3
  '@types/draft-js>immutable': 3.8.3
  # Force patched immutable 3.x for relay compiler chain.
  '@ardatan/relay-compiler>immutable': 3.8.3
  # Lift immutable ~3.7.6 to patched 3.8.3.
  immutable@~3.7.6: 3.8.3
  # Lift immutable ^5.0.2 to patched ^5.1.5.
  immutable@^5.0.2: ^5.1.5
  # Pin patched picomatch for transitive codegen chains.
  jest-util>picomatch: 2.3.2
  micromatch>picomatch: 2.3.2
  # Keep @types/react on v18 while app uses React 18.
  '@types/react': ^18.3.20
  # Avoid eslint breakage from old transitive globals.
  globals: ^16.0.0
  # Security pin from dependabot #136.
  'hds-react>@babel/runtime': ^7.27.0
  # Security/compat pin from dependabot #125.
  hds-react>cookie: ^0.7.2
  # Pin minimatch to patched range (ReDoS fixes).
  minimatch: '>=9.0.7'
  # Security pin for lodash prototype pollution advisories.
  lodash: ^4.18.1
  # Force patched underscore for doctoc dependency chain.
  doctoc>underscore: ^1.13.8
  # Security pin for vulnerable tmp in codegen toolchain.
  tmp: '>=0.2.4'

# pnpm 11 requires explicit opt-in for packages that run install scripts.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  msw: true
  unrs-resolver: true
